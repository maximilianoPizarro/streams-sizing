name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm test
      - run: node scripts/sync-engine.mjs
      - name: Verify engine sync
        run: diff engine/sizing-engine.mjs docs/assets/js/sizing-engine.mjs
